<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/shield.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            colors: {
              bg: {
                DEFAULT: '#0a0e1a',
                soft: '#111729',
                card: '#151c2e',
                hover: '#1a2238',
              },
              brand: {
                DEFAULT: '#6366f1',
                hover: '#4f46e5',
                light: '#818cf8',
              },
              success: '#10b981',
              warn: '#f59e0b',
              danger: '#ef4444',
              info: '#3b82f6',
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'slide-up': 'slideUp 0.3s ease-out',
              'fade-in': 'fadeIn 0.4s ease-out',
            },
            keyframes: {
              slideUp: {
                '0%': { transform: 'translateY(10px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
            },
          },
        },
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-bg text-slate-100 min-h-screen;
          background-image: radial-gradient(circle at 20% 0%, rgba(99, 102, 241, 0.05), transparent 50%),
                            radial-gradient(circle at 80% 100%, rgba(59, 130, 246, 0.04), transparent 50%);
        }
      }
      @layer components {
        .card {
          @apply bg-bg-card border border-slate-800/60 rounded-2xl p-6 shadow-xl;
        }
        .card-hover {
          @apply transition-all duration-200 hover:border-brand/40;
        }
        .btn {
          @apply inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg font-medium transition-all duration-150 text-sm;
        }
        .btn-primary {
          @apply btn bg-brand hover:bg-brand-hover text-white shadow-lg shadow-brand/20;
        }
        .btn-secondary {
          @apply btn bg-bg-soft hover:bg-bg-hover text-slate-200 border border-slate-700/60;
        }
        .btn-danger {
          @apply btn bg-danger/90 hover:bg-danger text-white;
        }
        .input {
          @apply w-full px-4 py-3 bg-bg-soft border border-slate-700 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all;
        }
        .badge {
          @apply inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold;
        }
        .badge-success { @apply badge bg-success/15 text-success border border-success/30; }
        .badge-warn    { @apply badge bg-warn/15 text-warn border border-warn/30; }
        .badge-danger  { @apply badge bg-danger/15 text-danger border border-danger/30; }
        .badge-info    { @apply badge bg-info/15 text-info border border-info/30; }
        .badge-muted   { @apply badge bg-slate-700/40 text-slate-300 border border-slate-700/60; }
      }
    </style>
    <style>
      html { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      code, pre, .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2a3349; border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: #3b4663; }
      .gradient-text {
        background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .glow { box-shadow: 0 0 40px -10px rgba(99, 102, 241, 0.4); }
      .dot-pulse { animation: dotPulse 1.6s ease-in-out infinite; }
      @keyframes dotPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(0.85); }
      }
    </style>
    <title>API Guardian | Intelligent Monitoring</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
