# ── Database ──────────────────────────────────────────────────────────────────
# Railway injects DATABASE_URL as postgresql://user:pass@host:port/db
# We prefix with jdbc: to satisfy Spring Boot's JDBC driver
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://localhost:5432/apiguardian}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── ML Service ────────────────────────────────────────────────────────────────
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey12}

# ── Frontend URL (for CORS) ───────────────────────────────────────────────────
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}